<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Selección de Sector</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
    <!-- Encabezado -->
    <div class="bg-emerald-700 p-6 text-center text-white">
      <div class="text-3xl font-black italic tracking-tighter mb-1">LOGO O SIGLAS</div>
      <h1 class="text-lg font-bold uppercase tracking-wide">Tu empresa</h1>
      <p class="text-emerald-100 text-xs mt-1">Control y Registro de Reportes</p>
    </div>

    <!-- Opciones de Selección -->
    <div class="p-6 space-y-4">
      <h2 class="text-center font-bold text-gray-700 text-sm uppercase tracking-wider mb-2">
        Seleccione el Sector a Administrar
      </h2>

      <!-- Botón Sector SECTOR 1 -->
      <a href="SECTOR 1.html" class="group flex items-center justify-between p-4 bg-emerald-50 hover:bg-emerald-600 border border-emerald-200 hover:border-emerald-600 rounded-xl transition-all duration-200 shadow-sm">
        <div>
          <span class="block font-black text-emerald-900 group-hover:text-white text-base">SECTOR 1</span>
          <span class="text-xs text-emerald-700 group-hover:text-emerald-100">Acceso a sistema y correlativos de Sector 1</span>
        </div>
        <svg class="w-6 h-6 text-emerald-600 group-hover:text-white transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
        </svg>
      </a>

      <!-- Botón Sector SECTOR 2 -->
      <a href="SECTOR 2.html" class="group flex items-center justify-between p-4 bg-emerald-50 hover:bg-emerald-600 border border-emerald-200 hover:border-emerald-600 rounded-xl transition-all duration-200 shadow-sm">
        <div>
          <span class="block font-black text-emerald-900 group-hover:text-white text-base">SECTOR 2</span>
          <span class="text-xs text-emerald-700 group-hover:text-emerald-100">Acceso a sistema y correlativos de Sector 2</span>
        </div>
        <svg class="w-6 h-6 text-emerald-600 group-hover:text-white transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
        </svg>
      </a>
    </div>

    <!-- Pie -->
    <div class="bg-gray-50 px-6 py-3 border-t border-gray-100 text-center">
      <span class="text-[11px] text-gray-500 font-medium">Developed by Ing. Siulangel D'Alto</span>
    </div>
  </div>

</body>
</html>
